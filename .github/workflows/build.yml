name: build

on:
  push:
    branches: [main, omp-experiment, pfor-experiment]
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'

jobs:
  build:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      # lfs: false (also the default) — skip downloading LFS objects.
      # They aren't needed to build and downloads count against the org
      # bandwidth quota.
      - uses: actions/checkout@v4
        with:
          lfs: false

      # OpenMP runtime — Linux gcc and Windows MSVC ship it inline.
      # Apple clang does not, so install brew libomp for the omp-experiment
      # branch. Harmless on the branches that don't link OpenMP.
      - name: Install libomp (macOS)
        if: runner.os == 'macOS'
        run: brew install libomp

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel
